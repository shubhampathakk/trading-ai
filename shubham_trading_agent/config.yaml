# =============================================================================
# Shubham Trading Agent — config
# =============================================================================
# Copy this file to `config.yaml` and edit for your account:
#     cp config.example.yaml config.yaml
#
# Two ways to fill in secrets (API keys, broker secrets, email password):
#
#   1. (Recommended) Keep the ${VAR_NAME} placeholders and put real values in
#      a `.env` file in this directory. python-dotenv substitutes them at
#      startup. .env is gitignored — secrets stay off git.
#      See `.env.example` for the variable names.
#
#   2. (Simpler, less safe) Replace each ${VAR_NAME} with the real string.
#      `config.yaml` is also gitignored, but laptop backups (Time Machine,
#      iCloud) WILL capture it. Rotate keys immediately if it leaks.
#
# Anything sensitive (real keys, real password) must NEVER be committed to
# this example file. Only placeholders.
# =============================================================================

email_settings:
  receiver_email: xxxxx@gmail.com
  send_daily_report: true
  sender_email: yyyyy@gmail.com
  sender_password: ${EMAIL_APP_PASSWORD}    # Gmail App Password (16 chars), NOT your account password
  smtp_port: 587
  smtp_server: smtp.gmail.com
google_api:
  api_key: ${GOOGLE_API_KEY}
news_api:
  api_key: ${NEWS_API_KEY}
openai_api:
  api_key: ${OPENAI_API_KEY}
# YouTube Data API v3 key — needed for listing recent uploads and resolving
# channel handles. Free tier (10K quota units/day) covers this easily.
# Get one at console.cloud.google.com -> Enable APIs -> YouTube Data API v3.
youtube_api:
  api_key: ${YOUTUBE_API_KEY}
# YouTube-driven sentiment: fetch latest video per channel (last N hours),
# strip sponsor segments via SponsorBlock, ask Gemini for a structured
# directional verdict, blend with the news-based score.
youtube_sentiment:
  enable: false
  max_video_age_hours: 18
  transcript_max_chars: 8000
  strip_categories:               # SponsorBlock categories to strip
    - sponsor
    - selfpromo
    - interaction
  llm_strip_fallback: true        # if no SponsorBlock data, ask Gemini to ignore promo
  overall_weight_vs_news: 2.0     # YouTube block weight relative to news block
  # gemini_model: ggemini-3.1-pro-preview # Old flagship model setting
  gemini_model: gemini-3.5-flash # Standardized: low-latency + defensive theta-selling GA model
  channels:
    - handle: "@shubham"
      display_name: "Shubham Pathak"
      weight: 10
    - handle: "@shubham"
      display_name: "Learning Markets with Shubham"
      weight: 10
risk_management:
  atr_multiplier: 2.0
  enable_daily_loss_limit: true
  enable_volatility_adjustment: true
  high_vix_risk_reduction_factor: 0.5
  high_vix_threshold: 22.0
  max_daily_loss_percent: 2.5
  # Consecutive-loss circuit breaker: halt the session after N losing trades
  # in a row without a winning trade in between. A winning trade resets the
  # streak to 0. The breaker is session-scoped (resets on bot restart).
  enable_consecutive_loss_limit: true
  max_consecutive_losses: 3
  # Weekly P&L cap: halt new entries for the remainder of the ISO week once
  # cumulative realized losses since Monday reach this % of starting capital.
  # Disabled by default — opt in by setting enable_weekly_loss_limit: true.
  enable_weekly_loss_limit: false
  max_weekly_loss_percent: 5.0
  # Step-Trail Stop-Loss System: moves stop-loss up in rigid steps as profit grows.
  # Works for both 1-lot (single contract) and multi-lot strategies.
  enable_step_trail: true
  step_trail:
    trigger_1: 15.0    # Step 1: profit hits +15%, SL moves to +2% (cover fees)
    sl_1: 2.0
    trigger_2: 30.0    # Step 2: profit hits +30%, SL moves to +15%
    sl_2: 15.0
    trigger_3: 50.0    # Step 3: profit hits +50%, SL moves to +30%
    sl_3: 30.0
    trigger_4: 9999.0  # Step 4: Disabled
    sl_4: 30.0
    trigger_5: 9999.0  # Step 5: Disabled
    sl_5: 30.0
strategy_signals:
  use_cpr_breakout: true
  use_ema_20_crossover: true
  use_ema_50_crossover: true
  use_rsi_divergence: true
# Put-Call Ratio feed. Fetches NIFTY option chain OI from Kite (NFO instruments
# + quote API). Used as a pre-trade gate: a PCR_BEARISH reading blocks BUY
# entries, PCR_BULLISH blocks SELL entries. Set enable: false to disable.
pcr_feed:
  enable: true
  strikes_each_side: 5          # ATM ± 5 strikes (11 total) for OI aggregation
  bullish_threshold: 1.2        # PCR >= this → PCR_BULLISH (confirms BUY bias)
  bearish_threshold: 0.8        # PCR <= this → PCR_BEARISH (confirms SELL bias)
  cache_seconds: 300            # refresh at most once per 5-min bar
# 15-minute confirmation gate. Before placing any trade, the bot fetches the
# 15-min bar series and checks that the higher-timeframe trend agrees:
#   BUY  requires: 15-min RSI > 50 AND close > 15-min EMA20
#   SELL requires: 15-min RSI < 50 AND close < 15-min EMA20
# Gate is bypassed when the 15-min data is unavailable or indicators are NaN,
# so a transient outage never silently blocks all trades.
# Set enable_15m_confirmation: false in trading_flags to disable.
trading_flags:
  backtest_years: 2
  chart_timeframe: 5minute
  ema_cross_lookback: 2500
  enable_natural_language_prompt: true
  enable_parallel_processing: true
  enable_gemini_loss_analysis: true
  manual_sentiment_override: true
  max_trades_per_day: 3
  max_vix_level: 25.0
  order_variety: regular
  # Entry fill confirmation: if a LIMIT entry doesn't fill within
  # order_fill_timeout_seconds / (max_fill_retries + 1) seconds, the order is
  # cancelled and re-submitted at a wider price (slippage * fill_retry_slippage_mult).
  # After max_fill_retries attempts, falls back to a MARKET order.
  max_fill_retries: 2
  fill_retry_slippage_mult: 2.0
  paper_trading: false
  product_type: MIS
  rag_min_trading_days: 1
  risk_per_trade_percent: 20.0
  run_startup_backtest: false
  # Alignment note: backtest_years drives the date range only when
  # run_startup_backtest is true. The bot will auto-align the window to
  # max(rag.recency_window_days + 20, 60) calendar days so generated data
  # actually falls inside the RAG recency window. Explicitly large values
  # trigger a warning log.
  stop_loss_percent: 25.0
  strategy_reassessment_period_minutes: 15
  # If a strategy produces 0 non-HOLD signals during its window, it's put in
  # cooldown for this many minutes. Time-based so it can rotate back later
  # as market conditions evolve.
  strategy_cooldown_minutes: 60
  # When true, every HOLD also logs the specific reason (which condition
  # wasn't met). Useful for diagnosing days where nothing fires.
  log_hold_reasons: true
  # ATR momentum gate. Skip entry when the avg ATR over the last N completed
  # bars is below this threshold — market is grinding too slowly for options
  # buying to be viable (theta > expected move). Set to 0 to disable.
  # NIFTY 5-min guidance: ~15 pts = slow chop (skip), 20-25 = moderate (borderline),
  # >25 = tradeable momentum (take it). Start at 15 and tune from logs.
  min_atr_per_bar: 0
  min_atr_lookback_bars: 3
  force_one_trade_today: false
  # Native Zerodha Market Protection for MARKET and SL-M orders. 
  # Values: 0 (none), 0-100 (custom protection %), -1 (auto protection)
  market_protection: -1
  # 15-minute confirmation gate (see pcr_feed block comment above for details).
  enable_15m_confirmation: true
  underlying_instrument: NIFTY 50
  use_rag: true
  win_rate_threshold: 55.0
  min_stop_loss_points: 7.0
  risk_reward_ratio: 2.0
  min_days_to_expiry: 2
  limit_order_slippage_percent: 0.5
  operator_input_timeout_seconds: 20
  pre_market_start_time: "08:50"
  entry_start_time: "09:30"
  # Hard new-entry cutoff. Professional rule: no new options entries after 13:30.
  # Theta and bid-ask spreads widen in the last 75 min before close.
  # Hard close of any open position at 14:00 is enforced in manage().
  entry_cutoff_time: "14:30"
  early_entry_gap_threshold_percent: 0.4
  strike_offset_steps: 1
  # ── Professional profit + quality controls ─────────────────────────────────
  # Daily profit target: halt new entries once this % of starting capital is
  # realized as profit. Protects morning gains from afternoon theta drain.
  # Set to 0 to disable.
  max_daily_profit_percent: 3.0
  # Day quality filter: only take entries on TRENDING days (ADX-based).
  # RANGE / CHOPPY days bleed theta with no directional persistence.
  enable_day_quality_filter: true
  # Trap / false-breakout detection: skips entries where the breakout bar
  # immediately reverses back inside the prior bar's high/low range.
  enable_trap_detection: true
  # Time-of-day position sizing: prime entry windows (09:30-10:15, 11:30-12:30)
  # get full size; lunch drift (12:30-13:30) gets 50%; after 13:30 = blocked.
  enable_time_of_day_sizing: true
# Tiered partial profit booking (professional 40/40/20 framework).
# T1: book t1_exit_pct% of original position when premium gains t1_gain_pct%;
#     simultaneously slides SL to breakeven.
# T2: book t2_exit_pct% when premium gains t2_gain_pct%;
#     the remaining 20% runner is trailed with a tightening % band.
# Partial exits are SKIPPED if fewer than 2 lots are held (can't split).
partial_exits:
  enable: true
  t1_gain_pct: 30          # +30% on entry premium → T1 exit
  t2_gain_pct: 60          # +60% on entry premium → T2 exit
  t1_exit_pct: 40          # sell 40% of original position at T1
  t2_exit_pct: 40          # sell 40% of original position at T2
  # Runner (remaining 20%) trail: tightened automatically by _dynamic_trail_pct
  # 0→T1: base trail %, T1→T2: 8%, T2+: 5%, after 13:30: forced to 5%
# Range-day scalping. On RANGE days (ADX < 20, low open range) the bot rotates
# to VWAP_Reversion / Reversal_Detector instead of sitting out completely.
# Tighter targets + smaller size match the lower momentum environment.
# CHOPPY days (7+ direction changes per hour) are still fully blocked.
# Set enable: false to revert to "skip RANGE days entirely".
range_scalp:
  enable: true
  size_factor: 1.0        # position size as a fraction of normal
  trail_pct: 10.0         # trailing stop % (vs 15% on trending days)
  t1_gain_pct: 15.0       # T1 profit target: +15% on entry premium
  t2_gain_pct: 25.0       # T2 profit target: +25% on entry premium
trailing_stop_loss:
  indicator_exit_type: PSAR
  ma_period: 9
  percentage: 15.0
  type: PERCENTAGE
  use_indicator_exit: true
  psar_step: 0.02
  psar_max: 0.2
# Automatic position-size mode switching.
# AGGRESSIVE: activated when recent performance warrants larger bets.
# MODERATE:   default; forced on consecutive losses, high drawdown, or elevated VIX.
# The effective risk % is injected into agents.py at each setup() call.
mode_switching:
  enable: true
  lookback_trades: 5              # evaluate this many recent trades for the mode decision
  # --- AGGRESSIVE thresholds ---
  aggressive_trigger_wins: 3     # wins needed in lookback window to go AGGRESSIVE
  aggressive_max_drawdown: 0.05  # max equity drawdown while staying AGGRESSIVE (5%)
  aggressive_risk_percent: 2.0   # risk_per_trade_percent when AGGRESSIVE (vs 1.0 default)
  aggressive_max_trades: 5       # max trades/day in AGGRESSIVE mode (vs 3 in MODERATE)
  aggressive_trail_pct: 20.0     # base trailing-stop % in AGGRESSIVE (vs 15%)
  aggressive_t1_gain_pct: 40.0   # T1 profit target in AGGRESSIVE (vs 30%)
  aggressive_t2_gain_pct: 80.0   # T2 profit target in AGGRESSIVE (vs 60%)
  # --- MODERATE thresholds ---
  moderate_trigger_losses: 2     # consecutive losses to force MODERATE
  moderate_drawdown: 0.08        # equity drawdown threshold to force MODERATE (8%)
  moderate_vix_threshold: 18.0   # VIX level that blocks AGGRESSIVE mode
# Note: Duplicate partial_exits override block removed. Primary configuration is defined at lines 181-186.
strike_steps:
  NIFTY: 50
  BANKNIFTY: 100
  FINNIFTY: 50
  MIDCPNIFTY: 25
  SENSEX: 100
# Strategy-selection RAG: only consider trades from the recency window, and
# only count strategies with enough recent trades. Stops the LLM and the
# regime/score fallback from anchoring on stale data from older bot versions.
rag:
  recency_window_days: 30
  min_trades_per_strategy: 3
# Deterministic strategy selector — no LLM required. 5-layer cascade:
#   1. Hard pins (event days / weekly expiry)
#   2. Open-gap override (gap-and-go days)
#   3. Indicator overrides (BB squeeze / NR7 / RSI extreme / volume spike / Supertrend flip)
#   4. Regime table (VIX x IV x Sentiment)
#   5. Last-resort default
strategy_selector:
  use_llm: true            # if true, consult Gemini first; cascade is fallback
  gap_override_pct: 0.8     # |open gap %| threshold for Layer-2 override
# Expiry-day overrides — auto-applied on any day where a contract of the
# configured underlying expires (detected from the live instrument list).
# Reduces risk on the day the broader market is being whipsawed by gamma trades.
expiry_day_overrides:
  enable: true
  risk_reduction_factor: 0.5      # halve risk per trade
  max_trades: 1                   # at most one trade on expiry day
  entry_cutoff_time: "13:00"      # tighter than the regular 14:30 cutoff
# Sentiment-refresh policy: capture sentiment + NL-prompt ONCE at startup,
# reuse on every strategy reassessment unless the market has materially shifted.
sentiment_refresh:
  enable: true
  spot_change_pct: 1.0     # underlying moved this much from baseline -> re-prompt
  vix_change_pct: 25.0     # VIX changed this much from baseline -> re-prompt
  on_sentiment_flip: true  # automated news-sentiment regime flipped -> re-prompt
# Option-chain analytics: liquidity filter + IV-Rank gate + IV/RV gate +
# delta-targeted strike selection. Disable by flipping `enable: false` to fall
# back to the legacy ATM/offset path with no chain checks.
option_filters:
  enable: true
  # Liquidity (gate the chosen strike, not just ATM)
  max_spread_percent: 2.0
  min_open_interest: 50000
  max_quote_age_seconds: 5
  # IV-Rank: skip new long-premium entries when today's ATM IV is in the top
  # `(100 - ivr_max_for_long)` percent of the recent IV range.
  ivr_max_for_long: 60
  ivr_lookback_days: 60
  ivr_min_samples: 10        # below this many samples in history, the gate is bypassed
  # IV vs realized vol: skip when implied vastly exceeds realized. Indian
  # options structurally trade ~1.3-1.5x of realized (overnight gap premium +
  # put skew), so 1.3 rejects most days. 1.5 is the realistic cutoff.
  # Indian options trade ~1.3-1.7x of realised vol naturally; 2.5 lets normal
  # conditions through and only blocks genuinely expensive IV regimes.
  iv_rv_max_ratio: 2.5       # set 0 to disable
  rv_lookback_days: 20
  # Strike selection: target a delta band (works around any IV regime). Falls
  # back to strike_offset_steps if the chain has no Greeks.
  use_delta_targeting: true
  target_delta_low: 0.40
  target_delta_high: 0.55
  # Risk-free rate used in Black-Scholes (India 10-yr ~7%).
  risk_free_rate: 0.07
  # How many strikes each side of ATM to fetch for the snapshot.
  chain_strikes_each_side: 10
# DTE-aware position sizing. Risk is scaled continuously based on how many
# calendar days remain until the selected option's expiry.
# Rationale: theta and gamma risks accelerate non-linearly in the final 2 DTE;
# buying options that close reduces size without skipping the trade entirely.
# Each factor multiplies risk_per_trade_percent (1.0 = no change).
# Debit-spread entry. When enabled, the bot buys the long leg (ATM/ITM option
# selected by the chain analysis or legacy path) AND sells an OTM option
# `spread_width_steps` strike steps away on the same expiry — converting the
# naked long into a 1×1 debit spread. The spread hard-caps the maximum loss to
# the net debit paid, eliminating unlimited theta / IV blowup risk.
#
# entry_price is stored as net debit (long fill − short fill), so all
# downstream P&L math (exit − entry) × qty remains unchanged.
#
# Disabled by default (enable: false) — naked-long behaviour is preserved.
# Enable only after confirming your Kite account has multi-leg NFO permissions.
debit_spread:
  enable: false
  spread_width_steps: 2   # short leg is this many strike steps OTM from the long leg
                           # NIFTY step=50 → 2 steps = 100 pts OTM
dte_sizing:
  factor_0: 0.50       # 0 DTE — expiry day: theta crush + binary gamma risk
  factor_1: 0.70       # 1 DTE — overnight gap risk compounds theta
  factor_2: 0.85       # 2 DTE — moderate theta drag, two sessions to go
# Option Selling configurations (Customizable intraday strangle/straddle)
# mode: "strangle" (sells OTM-2 strikes) or "straddle" (sells ATM-0 strikes)
# sl_multiplier: 1.25 = 25% stop loss, 1.30 = 30% stop loss, 1.50 = 50% stop loss
# use_sumeet_mongia_double_phase: set true to run the 09:16 + 02:16 two-phase masterclass strategy
option_selling:
  enable: false
  mode: "strangle"
  entry_time: "09:20:00"
  exit_time: "15:15:00"
  sl_multiplier: 1.25
  strike_offset_steps: 2
  hedge_offset_steps: 10
  use_sumeet_mongia_double_phase: false
  market_protection: -1

zerodha:
  access_token: ${ZERODHA_ACCESS_TOKEN}
  api_key: ${ZERODHA_API_KEY}
  api_secret: ${ZERODHA_API_SECRET}
